# ===========================================================
# FILE NÀY LÀ TEMPLATE - COPY THÀNH application.properties
# ĐỪNG ĐIỀN GIÁ TRỊ THẬT VÀO FILE NÀY
# ===========================================================
# Cách dùng:
#   1. Copy file này: cp application-example.properties application.properties
#   2. Điền các giá trị thật của bạn vào application.properties
#   3. File application.properties đã được .gitignore -> không bị push lên GitHub
# ===========================================================

spring.application.name=backend

# ─── Database Configuration (SQL Server) ───
# Thay YOUR_HOST, YOUR_DB_NAME, YOUR_USERNAME, YOUR_PASSWORD bằng thông tin thật
spring.datasource.url=jdbc:sqlserver://YOUR_HOST:1433;databaseName=YOUR_DB_NAME;encrypt=true;trustServerCertificate=true
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─── JPA Configuration ───
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ─── JWT Configuration ───
# Phải >= 32 ký tự
app.jwt.secret=CHANGE_ME_AT_LEAST_32_CHARS_LONG_SECRET_KEY
app.jwt.expirationMs=86400000

# ─── AES Encryption (Jira / GitHub tokens stored in DB) ───
# Phải đúng 16, 24, hoặc 32 ký tự ASCII
app.crypto.secret-key=CHANGE_ME_EXACTLY_32_CHARS_LONG!!
